<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Trackeur de reps</title>
</head>
<body>

    <div id="app">

        <header>
            <h1>Trackeur de performance</h1>
            <p>Afficher les jours de la semaine</p>
        </header>

        <nav>
            <!-- Month selector -->
            <ul id="nav-month">
                <li id="month-1" onclick="setMonth(1)">Month 1</li>
                <li id="month-2" onclick="setMonth(2)">Month 2</li>
                <li id="month-3" onclick="setMonth(3)">Month 3</li>
            </ul>

            <!-- Session selector -->
            <ul id="nav-session"></ul>

            <!-- Week selector -->
            <ul id="nav-week">
                <li id="week-1" onclick="setWeek(1)">Week 1</li>
                <li id="week-2" onclick="setWeek(2)">Week 2</li>
                <li id="week-3" onclick="setWeek(3)">Week 3</li>
                <li id="week-4" onclick="setWeek(4)">Week 4</li>
            </ul>

            <!-- View selector -->
            <ul id="nav-views">
                <li id="view-session" class="active" onclick="showView('session')">💪 Séance</li>
                <li id="view-stats" onclick="showView('stats')">📈 Stats</li>
                <li id="view-body" onclick="showView('body')">⚖️ Body</li>
            </ul>
        </nav>

        <!-- View: session -->
        <main id="main"></main>

        <!-- View: stats -->
        <section id="section-stats" class="hidden">
            <h2 class="stats-title">📈 Progression</h2>
            <p class="stats-subtitle">Poids max sur 3 mois</p>
            <div class="stats-select-wrapper">
                <select id="select-exercise" onchange="renderChart()"></select>
            </div>
            <div id="card-exercise-progress"></div>
            <div class="chart-wrapper">
                <canvas id="chart-exercise"></canvas>
            </div>
        </section>

        <!-- View: body composition -->
        <section id="section-body" class="hidden">
            <div id="body-inputs-container"></div>
        </section>

    </div>

    <script src="assets/js/app.js?v=2"></script>

</body>
</html>
